name: carteiras-devcontainer

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    command: sleep infinity
    environment:
      DATABASE_HOST: db
      DATABASE_USERNAME: carteiras
      DATABASE_PASSWORD: carteiras
      RAILS_ENV: development
      CHROME_BIN: /usr/bin/chromium
      CHROMEDRIVER_PATH: /usr/bin/chromedriver
      SELENIUM_BROWSER: chrome
    volumes:
      - ..:/workspace:cached
      - bundle-cache-ruby-4-0-5:/usr/local/bundle
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18.4-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: carteiras
      POSTGRES_PASSWORD: carteiras
      POSTGRES_DB: carteiras_development
    volumes:
      - postgres-18-cluster:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carteiras -d carteiras_development"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  bundle-cache-ruby-4-0-5:
  postgres-18-cluster:
